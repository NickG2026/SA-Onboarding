apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: nginx-pdb
spec:
  maxUnavailable: 0
  selector:
    matchLabels:
      app: nginx-pdb
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx-pdb
spec:
  selector:
    matchLabels:
      app: nginx-pdb
  replicas: 1
  template:
    metadata:
      labels:
        app: nginx-pdb
    spec:
      containers:
      - name: nginx
        image: nginx:latest
        ports:
        - containerPort: 80
